<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>登录 - AI电商运营管家</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 20%,rgba(37,99,235,.36),transparent 30%),radial-gradient(circle at 80% 20%,rgba(124,58,237,.36),transparent 30%),#050816;color:#fff;font-family:Arial,'Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}.card{width:min(460px,100%);border:1px solid rgba(255,255,255,.14);background:rgba(15,23,42,.74);backdrop-filter:blur(18px);border-radius:28px;padding:30px;box-shadow:0 24px 80px rgba(0,0,0,.3)}h1{margin:0 0 8px;font-size:30px}p{color:#94a3b8;line-height:1.7}.tabs{display:grid;grid-template-columns:1fr 1fr;margin:22px 0;background:rgba(255,255,255,.06);padding:6px;border-radius:16px}.tab{border:0;background:transparent;color:#cbd5e1;padding:12px;border-radius:12px;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white}.field{margin-bottom:14px}label{display:block;color:#cbd5e1;font-weight:800;font-size:13px;margin-bottom:8px}input,select{width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;border-radius:14px;padding:13px}button,a{display:block;width:100%;text-align:center;border:0;border-radius:14px;padding:14px;margin-top:12px;color:#fff;background:linear-gradient(135deg,#2563eb,#7c3aed);font-weight:900;text-decoration:none;cursor:pointer}.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.row{display:grid;grid-template-columns:1fr 110px;gap:8px}.small{font-size:13px;color:#93c5fd;text-align:center;margin-top:14px;cursor:pointer}@media(max-width:600px){.card{padding:22px;border-radius:22px}}</style></head><body><div class="card"><h1>进入AI电商运营管家</h1><p>支持手机验证码、邮箱验证码、密码登录和企业子账号登录。当前为页面版，验证码接口后续接入阿里云短信和SMTP邮箱。</p><div class="tabs"><button class="tab active" onclick="mode('login')">登录</button><button class="tab" onclick="mode('register')">注册</button></div><div id="form"></div><a class="ghost" href="index.html">返回官网</a></div><script>let current='login';function mode(m){current=m;document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',i===(m==='login'?0:1)));render()}function sendCode(){alert('演示验证码：123456。后续接阿里云短信/邮箱服务。')}function login(){localStorage.setItem('userAccount',document.getElementById('account').value||'boss');location.href='dashboard.html'}function register(){localStorage.setItem('userAccount',document.getElementById('account').value||'boss');localStorage.setItem('companyName',document.getElementById('company').value||'演示公司');location.href='dashboard.html'}function resetPwd(){alert('找回密码页面已预留：手机/邮箱验证码 + 设置新密码。')}function render(){if(current==='login'){form.innerHTML=`<div class="field"><label>登录方式</label><select><option>手机号验证码登录</option><option>邮箱验证码登录</option><option>账号密码登录</option><option>企业子账号登录</option></select></div><div class="field"><label>手机号 / 邮箱 / 账号</label><input id="account" placeholder="请输入账号，演示可填 boss"></div><div class="field"><label>验证码 / 密码</label><div class="row"><input id="code" placeholder="验证码或密码"><button onclick="sendCode()">获取</button></div></div><button onclick="login()">登录工作台</button><div class="small" onclick="resetPwd()">忘记密码？找回密码</div>`}else{form.innerHTML=`<div class="field"><label>公司名称</label><input id="company" placeholder="请输入企业或店铺名称"></div><div class="field"><label>身份类型</label><select><option>老板主账号</option><option>运营子账号</option><option>美工子账号</option><option>客服子账号</option><option>导师账号</option></select></div><div class="field"><label>手机号 / 邮箱</label><input id="account" placeholder="请输入手机号或邮箱"></div><div class="field"><label>验证码</label><div class="row"><input placeholder="验证码"><button onclick="sendCode()">获取</button></div></div><button onclick="register()">创建账号</button><div class="small">注册后可提交个人/企业实名认证</div>`}}render()</script></body></html>
