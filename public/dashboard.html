<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI电商运营管家后台</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#030712;color:#fff;font-family:Arial,'Microsoft YaHei',sans-serif;overflow-x:hidden}.bg{position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px),radial-gradient(circle at 12% 5%,rgba(37,99,235,.28),transparent 30%),radial-gradient(circle at 88% 0,rgba(124,58,237,.35),transparent 32%),#030712;background-size:42px 42px,42px 42px,auto,auto,auto;z-index:-1}.layout{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.sidebar{height:100vh;position:sticky;top:0;background:rgba(15,23,42,.78);border-right:1px solid rgba(255,255,255,.1);padding:22px;overflow-y:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#7c3aed,#22d3ee);display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 0 28px rgba(37,99,235,.55)}.brand h1{font-size:18px;margin:0}.brand p{font-size:12px;margin:4px 0;color:#93c5fd}.user-card{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);border-radius:20px;padding:16px;margin-bottom:18px}.user-card small{color:#93c5fd}.user-card strong{display:block;font-size:20px;margin:8px 0}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(37,99,235,.15);border:1px solid rgba(96,165,250,.25);color:#bfdbfe;font-size:12px}.nav-title{color:#64748b;font-size:12px;margin:18px 0 9px}.nav-btn{width:100%;text-align:left;border:none;color:#cbd5e1;background:transparent;border-radius:14px;padding:13px 14px;margin-bottom:7px;cursor:pointer;font-weight:800}.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}.nav-btn.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 0 22px rgba(37,99,235,.34)}.main{padding:24px}.topbar{border:1px solid rgba(255,255,255,.1);background:rgba(15,23,42,.66);border-radius:24px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}.topbar h2{margin:0 0 6px;font-size:26px}.topbar p{margin:0;color:#94a3b8;line-height:1.6}.btn{border:none;border-radius:14px;padding:12px 16px;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 0 26px rgba(37,99,235,.42)}.danger{background:rgba(185,28,28,.86)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}.card,.stat{border:1px solid rgba(255,255,255,.1);background:rgba(15,23,42,.68);border-radius:24px;padding:22px}.stat span{color:#94a3b8}.stat strong{display:block;font-size:30px;margin:10px 0}.green{color:#22c55e}.red{color:#fb7185}.grid-2{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}.card h3{font-size:24px;margin:0 0 10px}.desc{color:#94a3b8;line-height:1.7;margin-bottom:16px}label{display:block;margin-bottom:8px;color:#cbd5e1;font-weight:900;font-size:13px}input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:white;border-radius:14px;padding:13px 14px;outline:none}select option{background:#0f172a;color:#fff}textarea{min-height:124px;resize:vertical;line-height:1.7}.result{min-height:420px;max-height:700px;overflow:auto;white-space:pre-wrap;line-height:1.8;color:#dbeafe;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:18px}.task{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin:10px 0;line-height:1.7}.tags{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tag{border:1px solid rgba(96,165,250,.25);background:rgba(37,99,235,.13);color:#bfdbfe;border-radius:999px;padding:7px 10px;font-size:12px;cursor:pointer}.drop{border:1px dashed rgba(96,165,250,.48);border-radius:20px;padding:18px;text-align:center;color:#93c5fd;background:rgba(37,99,235,.08);min-height:120px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}.preview{max-width:100%;max-height:180px;border-radius:14px;margin-top:10px;border:1px solid rgba(255,255,255,.12)}.timeline{display:grid;gap:12px}.scene{border-left:4px solid #60a5fa;background:rgba(255,255,255,.055);border-radius:16px;padding:14px}.mobile-only{display:none}.desktop-only{display:block}@media(max-width:820px){.desktop-only{display:none}.mobile-only{display:block}.layout{display:block}.sidebar{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:76px;padding:8px;border-right:none;border-top:1px solid rgba(255,255,255,.12);z-index:50;display:flex;align-items:center;gap:8px;overflow-x:auto;background:rgba(8,13,30,.97)}.brand,.user-card,.nav-title,.sidebar .desktop-extra{display:none}.nav-btn{min-width:72px;height:54px;text-align:center;font-size:12px;margin:0;padding:8px}.main{padding:14px;padding-bottom:96px}.topbar{padding:16px;border-radius:18px;align-items:flex-start;flex-direction:column}.topbar h2{font-size:22px}.stats{grid-template-columns:1fr 1fr;gap:10px}.stat{padding:14px}.stat strong{font-size:22px}.grid-2,.grid-3,.form-grid{grid-template-columns:1fr}.card{padding:16px;border-radius:18px}.result{min-height:280px;max-height:none}.btn{width:100%;margin-top:8px}.actions{display:grid;grid-template-columns:1fr;gap:8px}.hide-mobile{display:none!important}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="layout">
  <aside class="sidebar" id="nav"></aside>
  <main class="main">
    <div class="topbar"><div><h2 id="title">AI电商作战指挥中心</h2><p id="subtitle">电脑端是完整工作台，手机端是轻量操作台。</p></div><div class="desktop-only"><a class="btn" href="index.html">返回官网</a><button class="btn danger" onclick="logout()">退出</button></div></div>
    <div id="content"></div>
  </main>
</div>
<script>
const pages={dashboard:['🏠','首页','今日数据、AI提醒和任务看板'],review:['📊','复盘','自动读取店铺数据，对比昨日计划和今日表现'],competitor:['🔎','竞品','粘贴竞品截图，分析价格、销量、主图和策略'],creative:['🎨','素材','图生图、文生图、参考图生图和详情页素材工作流'],video:['🎬','视频','产品识别、脚本、分镜、转场、字幕和剪映方案'],sales:['💬','成交','合并AI客服和询盘助手，分析聊天并生成回复策略'],mentor:['🧑‍🏫','导师','导师后台、真实案例、每日动作和数据验证'],stores:['🔗','店铺','多平台店铺授权中心，单平台最高100个'],credits:['💎','我的','AI积分、实名认证、账号安全和充值入口']};
let state={stores:[],me:{credits:0},image:null,chatImage:null,compImage:null};
const content=document.getElementById('content'),title=document.getElementById('title'),subtitle=document.getElementById('subtitle');
function renderNav(){const desktop=['dashboard','stores','review','competitor','creative','video','sales','mentor','credits'];const mobile=['dashboard','review','sales','creative','credits'];nav.innerHTML=`<div class="brand"><div class="logo">AI</div><div><h1>AI电商运营管家</h1><p>后台作战中心</p></div></div><div class="user-card"><small>老板主账号</small><strong>${localStorage.getItem('userAccount')||'boss'}</strong><span class="pill" id="creditPill">积分 ${state.me.credits||0}</span></div><div class="nav-title desktop-extra">核心工作台</div>`+desktop.map(k=>`<button class="nav-btn ${k==='dashboard'?'active':''} ${mobile.includes(k)?'':'desktop-extra'}" onclick="setPage('${k}',this)">${pages[k][0]}<span class="desktop-only"> ${pages[k][1]}</span><span class="mobile-only">${pages[k][1]}</span></button>`).join('')}
function setPage(k,btn){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');title.textContent=pages[k][1]==='首页'?'AI电商作战指挥中心':'AI'+pages[k][1]+'工作流';subtitle.textContent=pages[k][2];({dashboard,review,competitor,creative,video,sales,mentor,stores,credits}[k])()}
async function api(url,body){const r=await fetch(url,{method:body?'POST':'GET',headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});return await r.json()}
async function init(){state.me=await api('/api/me');state.stores=await api('/api/stores');renderNav();dashboard()}function logout(){location.href='login.html'}
function storeOptions(){return `<select id="storeId">${state.stores.map(s=>`<option value="${s.id}">${s.platform}｜${s.storeName}｜${s.lastSync}</option>`).join('')}</select>`}
function getStore(){return state.stores.find(s=>s.id===document.getElementById('storeId')?.value)||state.stores[0]}
function change(a,b){if(!b)return '-';const v=((a-b)/b*100).toFixed(1);return (v>=0?'+':'')+v+'%'}
function dashboard(){const s=state.stores[0]||{today:{},yesterday:{}};content.innerHTML=`<div class="stats"><div class="stat"><span>今日GMV</span><strong>¥${s.today.gmv||0}</strong><div class="green">${change(s.today.gmv,s.yesterday.gmv)}</div></div><div class="stat"><span>询盘</span><strong>${s.today.inquiries||0}</strong><div class="green">${change(s.today.inquiries,s.yesterday.inquiries)}</div></div><div class="stat"><span>ROI</span><strong>${s.today.roi||0}</strong><div class="red">${change(s.today.roi,s.yesterday.roi)}</div></div><div class="stat"><span>AI积分</span><strong>${state.me.credits||0}</strong><div class="green">按需使用AI能力</div></div></div><div class="grid-2"><div class="card"><h3>今日AI提醒</h3><div class="desc">根据已同步店铺数据、历史复盘记录和经营变化自动生成。</div><div class="task"><b>优先级1：</b>点击率下降，建议先复盘主图和关键词。</div><div class="task"><b>优先级2：</b>询盘增长但转化不足，需要检查报价话术和跟进情况。</div><div class="task"><b>优先级3：</b>ROI下降，广告不要盲目加预算，先修复承接链路。</div></div><div class="card"><h3>手机端轻量操作台</h3><div class="desc">手机端只保留最常用功能：今日复盘、成交分析、素材轻量方案、积分与账号。</div><div class="task">电脑端：完整SaaS工作台。</div><div class="task">手机端：首页 / 复盘 / 成交 / 素材 / 我的。</div></div></div>`}
function review(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI店铺复盘诊断</h3><div class="desc">选择已授权店铺后，系统自动带出今日/昨日数据。首次诊断会建立店铺基线；第二次开始才检查上次计划。</div><label>选择店铺</label>${storeOptions()}<div id="storeData" class="task"></div><div id="followUpBlock"></div><label>今天遇到的问题</label><textarea id="problem" placeholder="例如：询盘变少，客户问价后不回复，广告花费增加但成交没提升。"></textarea><div class="actions"><button class="btn" onclick="syncStore()">同步最新数据</button><button class="btn primary" onclick="runDiagnosis()">生成复盘诊断（2积分）</button></div></div><div class="card"><h3>AI诊断结果</h3><div id="reviewResult" class="result">请选择店铺并填写问题。</div></div></div>`;showStoreData();document.getElementById('storeId').onchange=showStoreData}
function showStoreData(){const s=getStore();if(!s)return;const isFirst=!s.historyCount;const base=`<b>${s.platform}｜${s.storeName}</b><br>今日GMV：¥${s.today.gmv}（昨日 ¥${s.yesterday.gmv}，${change(s.today.gmv,s.yesterday.gmv)}）<br>询盘：${s.today.inquiries}（昨日 ${s.yesterday.inquiries}，${change(s.today.inquiries,s.yesterday.inquiries)}）<br>点击率：${s.today.ctr}%（昨日 ${s.yesterday.ctr}%）<br>转化率：${s.today.cvr}%（昨日 ${s.yesterday.cvr}%）<br>ROI：${s.today.roi}（昨日 ${s.yesterday.roi}）`;if(isFirst){storeData.innerHTML=base+`<br><br><b>当前状态：首次诊断建档</b><br>暂无历史运营计划，本次诊断将作为店铺运营基线。<br>系统会生成今日优先任务、7天周期计划和下次复盘检查项。`;followUpBlock.innerHTML=''}else{const items=(s.lastDiagnosis?.nextReviewItems||[]).map((x,i)=>`${i+1}. ${x}`).join('<br>');storeData.innerHTML=base+`<br><br><b>当前状态：历史复盘</b><br>上次诊断时间：${s.lastDiagnosis?.createdAt||'-'}<br><br><b>上次AI给出的复盘检查项：</b><br>${items||'暂无检查项'}`;followUpBlock.innerHTML=`<label>上次计划完成情况</label><textarea id="executionFeedback" placeholder="请真实反馈：哪些做了？哪些没做？完成数量是多少？例如：主图已改2张；报价话术已整理；未回复客户跟进了3个。"></textarea>`}}
async function syncStore(){const s=getStore();const updated=await api(`/api/stores/${s.id}/sync`,{});state.stores=await api('/api/stores');showStoreData()}
async function runDiagnosis(){const s=getStore();const isFirst=!s.historyCount;reviewResult.textContent=isFirst?'AI正在建立首次诊断基线并生成周期计划...':'AI正在读取上次诊断记录、执行反馈和今日数据，生成复盘计划...';const d=await api('/api/diagnosis',{storeId:storeId.value,problem:problem.value,executionFeedback:document.getElementById('executionFeedback')?.value||''});reviewResult.textContent=`【${d.mode||'AI复盘'}】\n\n`+d.result+`\n\n【下次复盘检查项】\n${(d.nextReviewItems||[]).map((x,i)=>`${i+1}. ${x}`).join('\n')}\n\n剩余积分：${d.remainingCredits}`;state.me.credits=d.remainingCredits;state.stores=await api('/api/stores');renderNav();showStoreData()}
function pasteZone(id,cb){setTimeout(()=>{const el=document.getElementById(id);if(!el)return;el.ondragover=e=>{e.preventDefault();el.style.borderColor='#22d3ee'};el.ondrop=e=>{e.preventDefault();readFile(e.dataTransfer.files[0],cb)};window.onpaste=e=>{const item=[...e.clipboardData.items].find(i=>i.type.includes('image'));if(item)readFile(item.getAsFile(),cb)}})}
function readFile(file,cb){if(!file)return;const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(file)}
function competitor(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI竞品情报</h3><div class="desc">粘贴搜索页、竞品列表或主图截图，分析价格、销量、销售笔数和主图策略。</div><div class="drop" id="compDrop">Ctrl + V 粘贴竞品截图 / 拖拽图片</div><label>补充说明</label><textarea id="compText" placeholder="例如：这是1688同款搜索结果，帮我分析价格带和主图差异。"></textarea><button class="btn primary" onclick="runCompetitor()">生成竞品报告（3积分）</button></div><div class="card"><h3>竞品报告</h3><div id="compResult" class="result">等待上传竞品截图。</div></div></div>`;pasteZone('compDrop',src=>{state.compImage=src;compDrop.innerHTML=`已识别竞品截图<img class="preview" src="${src}">`})}
async function runCompetitor(){compResult.textContent='AI正在识别竞品价格、销量、笔数和主图特征...';const d=await api('/api/competitor',{image:state.compImage,text:compText.value});compResult.textContent=d.result+`\n\n剩余积分：${d.remainingCredits}`;state.me.credits=d.remainingCredits;renderNav()}
function creative(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI素材工作流</h3><div class="desc">上传产品图后，选择图生图、文生图、参考图生图、主图、详情页、场景图等流程。</div><div class="drop" id="imgDrop">Ctrl + V 粘贴产品图 / 拖拽图片</div><div class="form-grid"><div><label>生成模式</label><select id="mode"><option>图生图</option><option>文生图</option><option>参考图生图</option><option>风格迁移</option></select></div><div><label>素材类型</label><select id="asset"><option>Amazon主图</option><option>详情页图片</option><option>场景图</option><option>尺寸图</option><option>白底图</option><option>广告Banner</option></select></div><div><label>平台</label><select id="platform"><option>Amazon</option><option>1688</option><option>淘宝</option><option>Temu</option><option>TikTok</option></select></div><div><label>国家风格</label><select id="country"><option>美国</option><option>英国</option><option>德国</option><option>法国</option><option>日本</option></select></div><div><label>尺寸</label><select id="size"><option>1000x1000</option><option>800x800</option><option>1200x1600</option><option>1920x1080</option></select></div><div><label>清晰度</label><select id="quality"><option>标准</option><option>高清</option><option>超清</option></select></div><div><label>生成数量</label><select id="count"><option>1</option><option>2</option><option>4</option><option>6</option></select></div><div><label>风格</label><select id="style"><option>欧美高级感</option><option>极简电商</option><option>自然田园</option><option>暗黑氛围</option><option>节日爆款</option></select></div><div class="full"><label>提示词</label><textarea id="prompt" placeholder="像你平时给我提要求一样，描述你想要的图片效果。"></textarea></div></div><button class="btn primary" onclick="runCreative()">生成素材工作流（5积分）</button></div><div class="card"><h3>素材方案结果</h3><div id="creativeResult" class="result">当前版本输出工作流和Prompt方案；真实图生图接口后续接入。</div></div></div>`;pasteZone('imgDrop',src=>{state.image=src;imgDrop.innerHTML=`产品图已载入<img class="preview" src="${src}">`})}
async function runCreative(){creativeResult.textContent='AI正在识别产品并生成素材生产工作流...';const d=await api('/api/creative',{image:state.image,mode:mode.value,asset:asset.value,platform:platform.value,country:country.value,size:size.value,quality:quality.value,count:count.value,style:style.value,prompt:prompt.value});creativeResult.textContent=d.result+`\n\n剩余积分：${d.remainingCredits}`;state.me.credits=d.remainingCredits;renderNav()}
function video(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI短视频工作流</h3><div class="drop" id="videoDrop">Ctrl + V 粘贴产品图 / 拖拽图片</div><label>平台</label><select id="vPlatform"><option>抖店</option><option>TikTok</option><option>小红书</option><option>视频号</option><option>淘宝</option></select><label>产品/风格说明</label><textarea id="vInfo" placeholder="例如：树脂圣诞摆件，欧美节日氛围，用于TikTok短视频。"></textarea><button class="btn primary" onclick="runVideo()">生成视频时间轴（8积分）</button></div><div class="card"><h3>脚本与分镜</h3><div id="videoResult" class="result">等待输入产品图和需求。</div></div></div>`;pasteZone('videoDrop',src=>{state.image=src;videoDrop.innerHTML=`产品图已载入<img class="preview" src="${src}">`})}
async function runVideo(){videoResult.textContent='AI正在生成脚本、分镜、转场和字幕...';const d=await api('/api/video',{image:state.image,platform:vPlatform.value,info:vInfo.value});videoResult.textContent=d.result+`\n\n剩余积分：${d.remainingCredits}`;state.me.credits=d.remainingCredits;renderNav()}
function sales(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI成交作战台</h3><div class="desc">合并客服和询盘助手。粘贴聊天截图后，AI分析客户心理、成交概率和回复策略。</div><div class="drop" id="chatDrop">Ctrl + V 粘贴聊天截图 / 拖拽图片</div><div class="tags">${['嫌贵','MOQ','交期','质量','定制','不回复','比价','拖延付款','退款风险'].map(t=>`<span class="tag" onclick="tag.value='${t}'">${t}</span>`).join('')}</div><label>选择标签</label><input id="tag" placeholder="点击上方标签或手动输入"><label>补充聊天文字</label><textarea id="chatText" placeholder="也可以粘贴客户聊天文字。"></textarea><button class="btn primary" onclick="runSales()">分析并生成回复（2积分）</button></div><div class="card"><h3>成交分析结果</h3><div id="salesResult" class="result">等待聊天截图或文字。</div></div></div>`;pasteZone('chatDrop',src=>{state.chatImage=src;chatDrop.innerHTML=`聊天截图已载入<img class="preview" src="${src}">`})}
async function runSales(){salesResult.textContent='AI正在分析客户心理和成交概率...';const d=await api('/api/sales',{image:state.chatImage,tag:tag.value,text:chatText.value});salesResult.textContent=d.result+`\n\n剩余积分：${d.remainingCredits}`;state.me.credits=d.remainingCredits;renderNav()}
function mentor(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>AI运营导师后台</h3><div class="desc">不放给普通客户。用于录入真实店铺案例、每日操作、数据涨幅和导师反馈。</div><label>案例店铺</label><input id="caseStore" placeholder="例如：1688树脂工艺品店"><label>每日操作</label><textarea id="caseAction" placeholder="Day1：优化主图；Day2：调整报价话术；Day3：跟进客户。"></textarea><label>数据变化</label><textarea id="caseData" placeholder="GMV、询盘、CTR、ROI 等真实变化。"></textarea><label>导师评价与鼓励</label><textarea id="caseFeedback" placeholder="写给客户的评价、鼓励和下一步建议。"></textarea><button class="btn primary" onclick="saveCase()">保存导师案例</button></div><div class="card"><h3>导师系统说明</h3><div class="result">导师后台用于沉淀真实实操案例，而不是单纯写文字知识。后续接入真实店铺后，AI会验证数据涨幅是否与后台一致，判断是否夸张，并生成客户成长报告。</div></div></div>`}
async function saveCase(){await api('/api/mentor/case',{store:caseStore.value,action:caseAction.value,data:caseData.value,feedback:caseFeedback.value});alert('导师案例已保存')}
function stores(){const groups={};state.stores.forEach(s=>groups[s.platform]=(groups[s.platform]||0)+1);content.innerHTML=`<div class="card"><h3>店铺授权中心</h3><div class="desc">单平台最高100个授权店铺，适合代运营、集团商家、多店铺团队。</div><div class="grid-3">${['1688','淘宝','拼多多','抖店','小红书','TikTok','Amazon'].map(p=>`<div class="task"><b>${p}</b><br>已授权：${groups[p]||0}/100<br><button class="btn primary" onclick="authStore('${p}')">新增授权</button></div>`).join('')}</div><h3 style="margin-top:22px">已授权店铺</h3>${state.stores.map(s=>`<div class="task"><b>${s.platform}｜${s.storeName}</b><br>最近同步：${s.lastSync}<br>数据范围：${s.dataScope.join('、')}</div>`).join('')}</div>`}
async function authStore(p){const name=prompt('输入店铺名称');if(!name)return;const s=await api('/api/stores/authorize',{platform:p,storeName:name});state.stores.push(s);stores()}
function credits(){content.innerHTML=`<div class="grid-2"><div class="card"><h3>我的账号</h3><div class="task">账号：${localStorage.getItem('userAccount')||'boss'}</div><div class="task">AI积分：${state.me.credits||0}</div><div class="task">实名认证：${state.me.realNameStatus||'未认证'}</div><button class="btn primary" onclick="recharge(500)">模拟充值500积分</button></div><div class="card"><h3>实名认证与账号安全</h3><div class="desc">页面已预留手机验证码、邮箱验证码、找回密码、个人/企业实名认证。后续接真实阿里云短信、SMTP邮箱、实名接口。</div><label>企业名称</label><input placeholder="企业营业执照名称"><label>统一社会信用代码</label><input placeholder="请输入社会信用代码"><button class="btn">提交实名认证</button></div></div>`}
async function recharge(n){const d=await api('/api/credits/recharge',{amount:n});state.me.credits=d.credits;renderNav();credits()}
init();
</script>
</body>
</html>
